services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-CU12-ubuntu-22.04
    environment:
      SA_PASSWORD: "Dev_Password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  api:
    build:
      context: .
      dockerfile: API/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      - api